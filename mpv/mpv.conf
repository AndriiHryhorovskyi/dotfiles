# --- Апаратне прискорення ---
# Використовувати апаратне декодування, якщо це можливо.
# auto-safe обирає найкращий метод (зазвичай vaapi для Intel) і безпечно відкочується на софт, якщо кодек не підтримується.
# hwdec=auto-safe
hwdec=vaapi

# --- Відео вивід ---
# Використання GPU для виводу відео.
vo=gpu

# Вказати API (зазвичай auto працює добре, але для Linux/Intel це часто egl або wayland)
# gpu-context=auto
gpu-context=x11egl

# --- Енергозбереження та продуктивність ---
# Використовувати профіль 'fast', який відключає важкі шейдери та покращення,
# що сильно навантажують GPU і гріють ноутбук.
profile=fast

# Якщо profile=fast для вас дає занадто "мильну" картинку, закоментуйте рядок вище
# і розкоментуйте наступні параметри для ручного налаштування:

# scale=bilinear        # Найшвидший, найменш якісний
# cscale=bilinear
# dscale=bilinear
# dither-depth=no       # Відключає дизеринг (менше навантаження)
# deband=no             # Відключає дебандінг (згладжування градієнтів)

# --- Кешування (для онлайн відео) ---
# Дозволяє рідше звертатися до мережі/диска
cache=yes
demuxer-max-bytes=400M
demuxer-max-back-bytes=50M
# Чекати 10 секунд буферизації перед стартом (щоб не заїкалось на початку)
cache-pause=yes
cache-pause-wait=10

# --- Інше ---
# Синхронізація відео по аудіо (найменше навантаження на CPU/GPU)
video-sync=audio

# --- Вибір якості для стрімів/YouTube ---
# 1. height<=?720  -> Обмежити якість до FullHD (економить ресурси)
# 2. vcodec!=?av01  -> Заблокувати AV1 (бо ваш GPU його не вміє)
# 3. fps<=?30       -> Обмежити fps до 30
# 4. +bestaudio     -> Додати найкращий звук
# 5. /best          -> Якщо нічого не підійшло, відкрити хоч щось (резерв)
# Пріоритет H.264 (швидкий старт, економія), потім VP9. Жорстка заборона AV1.
ytdl-format="bestvideo[height<=?720][fps<=?30][vcodec*=vp9]+bestaudio/bestvideo[height<=?720][fps<=?30][vcodec*=avc]+bestaudio/best"


# force-ipv4: прибирає лаг з'єднання
# no-write-sub: не шукати і не качати субтитри (mpv це робить сам, якщо треба)
# no-playlist: не перевіряти, чи це плейлист (прискорює одиночні відео)
# no-check-certificate: трохи економить час на SSL (безпечно для ютуба)
ytdl-raw-options=force-ipv4=,no-write-sub=,no-write-auto-subs=,no-playlist=,no-check-certificates=
