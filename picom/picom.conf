#################################
#             Backend           #
#################################

# Використовуємо OpenGL для кращої продуктивності на Intel i5
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

# Важливо для стабільності на декількох моніторах
# Запобігає мерехтінню при перемиканні вікон у фокусі
unredir-if-possible = false;

# Вмикаємо VSync для прибирання розривів (tearing)
vsync = true;

# Використовуй EWMH для визначення активного вікна (важливо для i3)
use-ewmh-active-win = true;

#################################
#       Вимкнення ефектів       #
#################################

# Вимикаємо тіні
shadow = false;

# Вимикаємо затухання (fading) при відкритті/закритті вікон
fading = false;

# Вимикаємо будь-яку прозорість (робимо вікна 100% непрозорими)
inactive-opacity = 1.0;
frame-opacity = 1.0;
active-opacity = 1.0;
inactive-opacity-override = false;
# Вимикаємо розмиття фону (blur), 
blur-background = false;
#################################
#           Оптимізація         #
#################################

# Малювати лише ті частини екрана, що змінилися
# Це суттєво економить ресурси при скролінгу та роботі в Neovim
use-damage = true;

# Визначає тип вікна для кращої обробки i3wm
mark-wmwin-focused = true;
mark-ovlp-focused = true;
detect-rounded-corners = false;
# Допомагає уникнути глюків при перетягуванні вікон між екранами з різним DPI
detect-client-opacity = true;
detect-transient = true;

# Налаштування для конкретних типів вікон (опціонально)
wintypes:
{
  tooltip = { fade = false; shadow = false; opacity = 1.0; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; }
  dropdown_menu = { opacity = 1.0; }
};
